<!DOCTYPE html>
<html>
<head>
  <title>Students</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

<aside class="sidebar">
<h2>Menu</h2>

<nav>
<a href="teacher.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="attendance.html">Attendance</a>
<a href="results.html">Results</a>
</nav>

</aside>

<div class="main">

<header class="topbar">
<h3>Student Performance Manager</h3>
<button id="logoutBtn">Logout</button>
</header>

<div class="container">

<h2>Student Management</h2>

<h3>Add Student</h3>

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="regNo" placeholder="Register Number">
<input type="text" id="department" placeholder="Department">
<input type="number" id="semester" placeholder="Semester">

<button id="addStudentBtn">Add Student</button>

<h3>Student List</h3>

<table class="student-table">
<thead>
<tr>
<th>Name</th>
<th>Reg No</th>
<th>Semester</th>
<th>Attendance</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="studentList"></tbody>
</table>

</div>

</div>

</div>

<script type="module" src="./js/teacher.js"></script>
<script type="module" src="./js/logout.js"></script>
<script>
const links = document.querySelectorAll(".sidebar a");

links.forEach(link => {
if(link.href === window.location.href){
link.classList.add("active");
}
});
</script>

</body>
</html>
